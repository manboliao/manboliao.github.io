<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>報到系統-影像修復版</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
    #start-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn { padding: 20px 50px; font-size: 1.3em; background: #007bff; color: white; border: none; border-radius: 50px; }
    
    /* 相機容器 */
    #reader { width: 100vw; height: 100vh; background: #000; }
    /* 強制 Video 標籤填滿 */
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

    #overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .scan-box { width: 80%; height: 120px; border: 2px solid #28a745; background: rgba(40,167,69,0.1); }
    
    #result { position: fixed; bottom: 15%; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px; z-index: 101; text-align: center; display: none; border: 1px solid #444; }
  </style>
</head>
<body>

  <div id="start-screen">
    <h3>課程報到系統</h3>
    <button class="btn" onclick="init()">啟動掃描槍模式</button>
  </div>

  <div id="reader"></div>

  <div id="overlay">
    <div class="scan-box"></div>
    <p style="margin-top:15px; text-shadow: 1px 1px 2px #000;">對準身分證背面條碼</p>
  </div>

  <div id="result"><div id="name" style="font-size:1.5em; font-weight:bold; color:#28a745;"></div></div>

<script>
  // ⚠️ 填入您剛才測試成功的 GAS /exec 網址
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwqMg0DXeIFvgfvWFQ-Yk31MpqbQ7jYw0CD2tLrEmYrhmRIQwiBanZviehcj4HhSz4C/exec";
  let scanner;

  async function init() {
    document.getElementById('start-screen').style.display = 'none';
    scanner = new Html5Qrcode("reader");

    try {
      await scanner.start(
        { facingMode: "environment" }, 
        { fps: 15, qrbox: { width: 280, height: 120 } },
        onScan
      );

      // 【黑畫面特效藥】：強迫 Video 播放
      const v = document.querySelector('#reader video');
      if (v) {
        v.setAttribute('playsinline', 'true');
        v.muted = true;
        v.play();
      }
    } catch (err) {
      alert("相機啟動錯誤: " + err);
    }
  }

  function onScan(code) {
  // 前端初步過濾：只接受包含身分證格式的字串
  const regex = /[A-Z][1-289]\d{8}/i;
  const match = code.match(regex);
  
  if (!match) {
    // 如果掃到的東西不符合格式，就不理它，繼續掃描
    console.log("偵測到雜訊，自動忽略: " + code);
    return; 
  }

  // 只有符合格式才暫停掃描並比對
  scanner.pause();
  const cleanCode = match[0].toUpperCase();
  
  const res = document.getElementById('result');
  const name = document.getElementById('res-name');
  res.style.display = 'block';
  name.innerText = "⏳ 比對中...";

  fetch(`${GAS_URL}?id=${encodeURIComponent(cleanCode)}`)
    .then(r => r.json())
    .then(d => {
      if (d.status === "success") {
        name.innerText = "✅ " + d.name;
        name.style.color = "#28a745";
      } else {
        name.innerText = "❌ " + d.msg;
        name.style.color = "#dc3545";
      }
      if(navigator.vibrate) navigator.vibrate(200);
      setTimeout(() => { res.style.display = 'none'; scanner.resume(); }, 2500);
    })
    .catch(e => {
      name.innerText = "連線失敗";
      setTimeout(() => { res.style.display = 'none'; scanner.resume(); }, 2500);
    });
}
</script>
</body>
</html>
