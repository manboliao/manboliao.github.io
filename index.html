<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>專業掃描系統 - 影像強制版</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
    
    /* 核心相機容器：強制撐開且設為黑色底 */
    #reader { 
      width: 100vw !important; 
      height: 100vh !important; 
      position: fixed; 
      top: 0; 
      left: 0; 
      z-index: 1; /* 最底層 */
      background: #000;
    }

    /* 強制內部的 Video 標籤充滿螢幕且置頂 */
    video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    #start-screen {
      position: fixed; inset: 0; background: #1a1a1a; 
      z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .btn { padding: 20px 50px; font-size: 1.3em; background: #007bff; color: white; border: none; border-radius: 50px; cursor: pointer; }

    #overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .scan-box { width: 80%; height: 120px; border: 2px solid #28a745; box-shadow: 0 0 20px rgba(40,167,69,0.5); position: relative; }
    .scan-line { position: absolute; width: 100%; height: 2px; background: #ff0000; top: 50%; animation: scan-m 2s infinite linear; }
    @keyframes scan-m { 0%, 100% { top: 10%; } 50% { top: 90%; } }

    #result { 
      position: fixed; bottom: 15%; left: 50%; transform: translateX(-50%);
      width: 80%; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px; 
      z-index: 100; text-align: center; display: none; border: 1px solid #444;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <h3>中醫課程報到系統</h3>
    <button class="btn" onclick="go()">啟動相機</button>
    <p style="color:#666; margin-top:20px;">請確保使用 Safari 或 Chrome</p>
  </div>

  <div id="reader"></div>

  <div id="overlay">
    <div class="scan-box"><div class="scan-line"></div></div>
    <p style="margin-top:15px; background: rgba(0,0,0,0.5); padding: 5px 10px;">請將條碼置於綠框內</p>
  </div>

  <div id="result">
    <div id="name" style="font-size:1.5em; font-weight:bold; color:#28a745;"></div>
  </div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwqMg0DXeIFvgfvWFQ-Yk31MpqbQ7jYw0CD2tLrEmYrhmRIQwiBanZviehcj4HhSz4C/exec";
  let scanner;

  async function go() {
    document.getElementById('start-screen').style.display = 'none';

    // 1. 初始化掃描器
    scanner = new Html5Qrcode("reader");

    const config = { 
      fps: 20, 
      qrbox: { width: 280, height: 120 },
      // 移除一切多餘的限制，讓它跑預設最穩定的模式
    };

    try {
      // 2. 啟動
      await scanner.start(
        { facingMode: "environment" }, 
        config, 
        onScan
      );

      // 3. 【黑畫面終結者】：強制 Video 標籤播放
      const v = document.querySelector('#reader video');
      if (v) {
        v.setAttribute('playsinline', 'true');
        v.setAttribute('muted', 'true');
        v.setAttribute('autoplay', 'true');
        v.play(); // 強制執行播放指令
      }
      
      console.log("相機已啟動並嘗試播放");

    } catch (err) {
      alert("相機啟動錯誤: " + err);
      document.getElementById('start-screen').style.display = 'flex';
    }
  }

  function onScan(code) {
    scanner.pause();
    const res = document.getElementById('result');
    const name = document.getElementById('name');
    
    res.style.display = 'block';
    name.innerText = "⏳ 比對中...";

    fetch(`${GAS_URL}?id=${encodeURIComponent(code)}`)
      .then(r => r.json())
      .then(d => {
        name.innerText = d.status === "success" ? "✅ " + d.name : "❌ " + d.msg;
        if(navigator.vibrate) navigator.vibrate(200);
        setTimeout(() => {
          res.style.display = 'none';
          scanner.resume();
        }, 3000);
      })
      .catch(e => {
        name.innerText = "❌ 連線失敗";
        setTimeout(() => { res.style.display = 'none'; scanner.resume(); }, 3000);
      });
  }
</script>
</body>
</html>
